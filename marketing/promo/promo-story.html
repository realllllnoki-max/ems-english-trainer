<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Noto Sans JP';
    src: url('NotoSansJP.ttf') format('truetype');
    font-weight: 100 900;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1920px; overflow:hidden; }
  body {
    font-family:'Noto Sans JP','Noto Color Emoji',sans-serif;
    background:
      radial-gradient(1000px 800px at 90% 6%, rgba(255,200,0,.16), transparent 60%),
      radial-gradient(900px 800px at 5% 60%, rgba(255,75,75,.10), transparent 55%),
      linear-gradient(170deg, #fffdf9 0%, #fdf3ea 55%, #ffe9de 100%);
    color:#26303e;
    position:relative;
  }
  .grad-text {
    background:linear-gradient(92deg,#ff4b4b 5%,#ff7a2f 55%,#ffb300 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .pill {
    position:absolute; top:64px; left:50%; transform:translateX(-50%);
    background:linear-gradient(90deg,#ff4b4b,#ff6b35);
    color:#fff; font-size:29px; font-weight:700; letter-spacing:.02em;
    padding:15px 36px; border-radius:20px; white-space:nowrap;
    box-shadow:0 8px 22px rgba(255,75,75,.30);
  }

  .headline { position:absolute; top:158px; left:0; right:0; text-align:center; line-height:1.14; font-weight:900; }
  .headline .l1 { font-size:84px; letter-spacing:.02em; }
  .headline .l2 { font-size:120px; letter-spacing:.02em; }

  .feats { position:absolute; top:462px; left:50%; transform:translateX(-50%); display:flex; gap:66px; }
  .feat { text-align:center; width:170px; }
  .feat .c {
    width:104px; height:104px; border-radius:50%; margin:0 auto 12px;
    display:flex; align-items:center; justify-content:center; font-size:50px;
    box-shadow:0 6px 16px rgba(38,48,62,.08);
  }
  .feat:nth-child(1) .c { background:#ffdfe0; }
  .feat:nth-child(2) .c { background:#ddf4ff; }
  .feat:nth-child(3) .c { background:#fff5d6; }
  .feat .t { font-size:26px; font-weight:700; color:#3c3c3c; white-space:nowrap; }

  /* ── phone mockup(実アプリのスクリーンショットを表示) ── */
  .phone {
    position:absolute; top:680px; left:322px; width:436px; height:900px;
    background:#3a3d42; border-radius:66px; padding:14px;
    box-shadow:0 34px 70px rgba(38,48,62,.28), inset 0 0 0 3px #55585e;
    z-index:5;
  }
  .screen { width:100%; height:100%; background:#fff; border-radius:53px; overflow:hidden; position:relative; }
  .notch {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    width:120px; height:31px; background:#111; border-radius:16px; z-index:9;
  }
  .sbar { height:56px; display:flex; justify-content:space-between; align-items:center; padding:14px 32px 0; font-size:20px; font-weight:700; background:#fff; }
  .shot { display:block; width:408px; height:816px; object-fit:cover; object-position:top; }

  .bubble {
    position:absolute; top:1300px; left:766px; width:216px; height:216px; border-radius:50%;
    background:linear-gradient(140deg,#ff4b4b,#ff7a2f 60%,#ffb300);
    color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow:0 14px 30px rgba(255,90,40,.40); z-index:8; text-align:center; line-height:1.22;
  }
  .bubble .s { font-size:24px; font-weight:800; }
  .bubble .b { font-size:44px; font-weight:900; letter-spacing:.02em; }
  .mascot {
    position:absolute; top:1330px; left:132px; width:210px; z-index:6;
    transform:rotate(-7deg) scaleX(-1);
    filter:drop-shadow(0 12px 18px rgba(38,48,62,.30));
  }

  .sub { position:absolute; top:1626px; left:0; right:0; text-align:center; font-size:36px; font-weight:900; letter-spacing:.02em; }

  .cta {
    position:absolute; left:130px; top:1690px; width:820px; height:130px;
    background:rgba(255,255,255,.94); border-radius:28px;
    box-shadow:0 14px 34px rgba(38,48,62,.12);
    display:flex; align-items:center; gap:20px; padding:0 28px;
  }
  .cta .icon {
    width:86px; height:86px; border-radius:22px; flex:0 0 auto;
    background:linear-gradient(140deg,#ff6b5e,#ff4b4b 55%,#e63c3c);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 18px rgba(255,75,75,.35);
  }
  .cta .icon img { width:73px; height:73px; }
  .cta .name .n { font-size:29px; font-weight:900; white-space:nowrap; }
  .cta .name .d { font-size:21px; font-weight:900; color:#ea2b2b; margin-top:4px; }
  .badges { display:flex; flex-direction:column; gap:9px; margin-left:auto; flex:0 0 auto; }
  .badge {
    background:#111418; color:#fff; border-radius:12px; padding:7px 17px;
    display:flex; align-items:center; gap:10px;
  }
  .badge .bi { font-size:21px; }
  .badge .bt { font-size:17px; font-weight:700; white-space:nowrap; }

  .band {
    position:absolute; left:0; right:0; bottom:0; height:60px;
    background:linear-gradient(90deg,#ff4b4b 0%,#ff6b35 45%,#ffb300 100%);
    display:flex; align-items:center; justify-content:center; z-index:4;
    color:#fff; font-size:24px; font-weight:900; letter-spacing:.14em;
  }
</style>
</head>
<body>

  <div class="pill">英語の傷病者、自信を持って問診できますか?</div>

  <div class="headline">
    <div class="l1">机のいらない</div>
    <div class="l2"><span class="grad-text">救急英語</span></div>
  </div>

  <div class="feats">
    <div class="feat"><div class="c">🎙️</div><div class="t">発音AI判定</div></div>
    <div class="feat"><div class="c">🔀</div><div class="t">分岐シナリオ</div></div>
    <div class="feat"><div class="c">🔤</div><div class="t">単語クイズ</div></div>
  </div>

  <div class="phone">
    <div class="screen">
      <div class="notch"></div>
      <div class="sbar">
        <span>9:41</span>
        <span style="display:flex;gap:7px;align-items:center;">
          <svg width="20" height="14" viewBox="0 0 20 14"><rect x="0" y="9" width="3.5" height="5" rx="1" fill="#111"/><rect x="5.5" y="6" width="3.5" height="8" rx="1" fill="#111"/><rect x="11" y="3" width="3.5" height="11" rx="1" fill="#111"/><rect x="16.5" y="0" width="3.5" height="14" rx="1" fill="#111"/></svg>
          <svg width="24" height="14" viewBox="0 0 26 14"><rect x="0" y="0" width="22" height="13" rx="3.5" stroke="#111" stroke-width="1.6" fill="none"/><rect x="2.2" y="2.2" width="15" height="8.6" rx="1.8" fill="#111"/><rect x="23.4" y="4" width="2.4" height="5" rx="1.2" fill="#111"/></svg>
        </span>
      </div>
      <img class="shot" src="screens/judge.png" alt="">
    </div>
  </div>

  <img class="mascot" src="../../logo.png" alt="">
  <div class="bubble"><span class="s">登録不要</span><span class="b">毎日1問</span><span class="s">無料で練習</span></div>

  <div class="sub">救急隊のための英語問診トレーナー</div>

  <div class="cta">
    <div class="icon"><img src="../../logo.png" alt=""></div>
    <div class="name">
      <div class="n">机のいらない救急英語</div>
      <div class="d">nodesk-qq-english.com</div>
    </div>
    <div class="badges">
      <div class="badge"><span class="bi">🌐</span><span class="bt">ブラウザで開くだけ</span></div>
      <div class="badge"><span class="bi">📲</span><span class="bt">登録不要・毎日1問無料</span></div>
    </div>
  </div>

  <div class="band">無料で1問やってみる!</div>

</body>
</html>
