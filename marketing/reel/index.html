<!doctype html>
<html
  lang="ja"
  data-composition-variables='[
    {"id":"q","type":"string","label":"English phrase","default":"Can you tell me what happened?"},
    {"id":"qjp","type":"string","label":"JP phrase","default":"何があったか教えてもらえますか？"},
    {"id":"a","type":"string","label":"Patient reply (EN)","default":"I suddenly felt chest pain."},
    {"id":"ajp","type":"string","label":"Patient reply (JP)","default":"急に胸が痛くなりました。"},
    {"id":"framework","type":"string","label":"Framework","default":"OPQRST"},
    {"id":"stepWord","type":"string","label":"Step","default":"Provocation"},
    {"id":"sceneTitle","type":"string","label":"Scene","default":"胸痛"}
  ]'
>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>EMS English Trainer — Daily Reel</title>
<script src="assets/gsap.min.js"></script>
<script src="timeline.js"></script>
<style>
  @font-face{
    font-family:"Noto Sans JP";
    src:url("assets/NotoSansJP.ttf") format("truetype");
    font-weight:100 900;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --ink:#23253A;      /* warm navy */
    --cream:#FFF6E7;    /* warm cream */
    --red:#E8433F;      /* rescue red */
    --yellow:#FFC53D;   /* pop yellow */
    --sky:#57B7E6;      /* pop sky blue */
    --mute:#8A8Fa6;
  }
  html,body{width:1080px;height:1920px;overflow:hidden;background:var(--cream)}
  body{font-family:"Noto Sans JP","Noto Color Emoji",sans-serif;color:var(--ink)}
  #root{position:relative;width:1080px;height:1920px;overflow:hidden;background:var(--cream)}

  /* ---------- persistent backdrop (always visible, non-clip) ---------- */
  .bg{position:absolute;inset:-10%;background:
      radial-gradient(circle at 82% 10%, rgba(87,183,230,.18), transparent 42%),
      radial-gradient(circle at 12% 92%, rgba(232,67,63,.12), transparent 45%),
      var(--cream)}
  .dots{position:absolute;inset:-10%;transform-origin:center;
      background-image:radial-gradient(circle, rgba(35,37,58,.05) 0 12px, transparent 13px);
      background-size:150px 150px}

  /* ---------- beats (each is a full-frame clip) ---------- */
  .beat{position:absolute;inset:0;transform-origin:center}
  .beat .fill{position:absolute;inset:0}
  .beat .stage{position:absolute;inset:0;padding:0 108px;display:flex;flex-direction:column;justify-content:center}
  .beat .stage.center{align-items:center;text-align:center}
  .fill.white{background:#FFFFFF}
  .fill.ink{background:var(--ink)}
  .fill.red{background:var(--red)}
  #b4{color:var(--cream)}
  #b8{color:#fff}

  .tag{display:inline-flex;align-items:center;gap:14px;align-self:flex-start;
       background:var(--red);color:#fff;border-radius:999px;padding:16px 40px;
       font-size:36px;font-weight:900;letter-spacing:.14em;transform:rotate(-2deg)}
  .center .tag{align-self:center}
  #b4 .tag{background:var(--yellow);color:var(--ink)}

  /* mascot sticker (rounded square, thick border, offset shadow) */
  .mascot{position:absolute;background:#fff;border:10px solid var(--ink);
          border-radius:30%;box-shadow:0 16px 0 rgba(35,37,58,.14);object-fit:cover;
          transform-origin:center;will-change:transform}

  /* b1 slam */
  #b1 .stage{justify-content:center;padding-bottom:330px}
  .slam{font-size:118px;font-weight:900;line-height:1.24;letter-spacing:.01em;
        white-space:nowrap;transform-origin:center;will-change:transform}
  .slam .r{color:var(--red)}
  #b1 .under{margin-top:44px;font-size:40px;font-weight:800;letter-spacing:.2em;color:var(--mute)}
  #b1 .mascot{width:340px;height:340px;bottom:170px;left:50%;margin-left:-170px}

  /* b2 JP phrase */
  #b2 .phrase{margin-top:70px;font-weight:900;line-height:1.42}
  #b2 .phrase .line{white-space:nowrap;overflow:hidden}
  #b2 .phrase .line>span{display:inline-block}
  #b2 .sub{margin-top:70px;font-size:44px;font-weight:800;color:var(--sky)}

  /* b3 countdown */
  #b3 .count{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  #b3 .n{position:absolute;font-size:540px;font-weight:900;line-height:1;color:#fff;
         transform-origin:center;will-change:transform}
  #b3 .hint{position:absolute;bottom:430px;left:0;right:0;text-align:center;color:#fff;
            font-size:46px;font-weight:900;letter-spacing:.2em}
  #b3 .mascot{width:230px;height:230px;bottom:150px;left:50%;margin-left:-115px}

  /* b4 kinetic answer */
  #b4 .stage{justify-content:center}
  .kinetic{font-size:108px;font-weight:900;line-height:1.24;letter-spacing:-.01em;margin-top:72px}
  .kinetic .w{display:inline-block;margin-right:.24em;transform-origin:center;will-change:transform}
  .kinetic .w.hl{color:var(--yellow)}

  /* b5 answer settled */
  #b5 .en{font-size:84px;font-weight:900;line-height:1.3}
  #b5 .rule{width:130px;height:10px;border-radius:99px;background:var(--red);
            margin:60px 0;transform-origin:left center}
  #b5 .jp{font-size:50px;font-weight:700;color:var(--mute);line-height:1.55}

  /* b6/b7 patient reply */
  .quotewrap{border-left:12px solid var(--red);padding-left:56px;border-radius:2px;will-change:transform}
  #b6 .en{font-size:88px;font-weight:900;line-height:1.32}
  #b7 .jp{font-weight:900;line-height:1.44}
  #b7 .jp .line{white-space:nowrap}
  .chip{margin-top:76px;display:inline-flex;align-self:flex-start;align-items:center;gap:14px;
        background:var(--cream);border:6px solid var(--ink);border-radius:999px;
        padding:18px 42px;font-size:36px;font-weight:900;transform:rotate(-1.5deg)}
  .chip b{color:var(--red)}

  /* b8 CTA */
  #b8 .mascot{position:static;width:400px;height:400px;border-color:#fff;
              box-shadow:0 16px 0 rgba(0,0,0,.18)}
  #b8 .name{margin-top:52px;font-size:74px;font-weight:900}
  #b8 .desc{margin-top:26px;font-size:45px;font-weight:800;opacity:.95}
  #b8 .link{margin-top:64px;display:inline-block;background:var(--ink);color:#fff;
            border-radius:999px;padding:30px 64px;font-size:46px;font-weight:900;
            box-shadow:0 12px 0 rgba(0,0,0,.18)}

  /* b9 loop bridge */
  #b9 .stage{padding-bottom:260px}
  #b9 .big{font-size:84px;font-weight:900;line-height:1.3;white-space:nowrap}
  #b9 .big .r{color:var(--red)}
  #b9 .sub{margin-top:56px;font-size:46px;font-weight:800;color:var(--mute)}
  #b9 .mascot{width:250px;height:250px;bottom:180px;left:50%;margin-left:-125px}

  /* watermark + loop flash (persistent overlays) */
  #wm{position:absolute;bottom:88px;left:0;right:0;text-align:center;font-size:30px;
      font-weight:900;letter-spacing:.34em;color:rgba(35,37,58,.35);z-index:60}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:100;pointer-events:none}
</style>
</head>
<body>
<div id="root" data-composition-id="reel" data-width="1080" data-height="1920" data-duration="22.8" data-fps="60">

  <!-- persistent backdrop -->
  <div class="bg" id="bg"></div>
  <div class="dots" id="dots"></div>

  <!-- B1: hook slam + mascot bounce -->
  <section class="beat clip" id="b1" data-start="0" data-duration="1.4" data-track-index="1">
    <div class="stage center">
      <div class="slam" id="slamEl"><div class="l1">これ、<span class="r">英語</span>で</div><div class="l2">言えますか？</div></div>
      <div class="under">救急現場のひとこと</div>
      <img class="mascot" id="mascot1" src="assets/mascot.png" alt="" />
    </div>
  </section>

  <!-- B2: the JP phrase -->
  <section class="beat clip" id="b2" data-start="1.4" data-duration="3.6" data-track-index="1">
    <div class="fill white"></div>
    <div class="stage">
      <div class="tag">🚑 きょうの1フレーズ</div>
      <div class="phrase" id="phraseJp"></div>
      <div class="sub">↓ 3秒でこたえ</div>
    </div>
  </section>

  <!-- B3: countdown (red -> yellow -> sky) -->
  <section class="beat clip" id="b3" data-start="5.0" data-duration="3.0" data-track-index="1">
    <div class="fill" id="b3fill"></div>
    <div class="count">
      <div class="n" id="cd3">3</div>
      <div class="n" id="cd2">2</div>
      <div class="n" id="cd1">1</div>
    </div>
    <div class="hint">声に出して！</div>
    <img class="mascot" id="mascot2" src="assets/mascot.png" alt="" />
  </section>

  <!-- B4: kinetic answer on ink -->
  <section class="beat clip" id="b4" data-start="8.0" data-duration="3.2" data-track-index="1">
    <div class="fill ink"></div>
    <div class="stage">
      <div class="tag">ANSWER ✨</div>
      <div class="kinetic" id="kineticEl"></div>
    </div>
  </section>

  <!-- B5: answer settled -->
  <section class="beat clip" id="b5" data-start="11.2" data-duration="3.2" data-track-index="1">
    <div class="stage">
      <div class="en" id="ansEn"></div>
      <div class="rule"></div>
      <div class="jp" id="ansJp"></div>
    </div>
  </section>

  <!-- B6: patient reply EN -->
  <section class="beat clip" id="b6" data-start="14.4" data-duration="2.6" data-track-index="1">
    <div class="fill white"></div>
    <div class="stage">
      <div class="tag">🗣️ 患者はこう返す</div>
      <div class="quotewrap" style="margin-top:80px"><div class="en" id="replyEn"></div></div>
    </div>
  </section>

  <!-- B7: reply JP + framework -->
  <section class="beat clip" id="b7" data-start="17.0" data-duration="2.4" data-track-index="1">
    <div class="fill white"></div>
    <div class="stage">
      <div class="quotewrap"><div class="jp" id="replyJp"></div></div>
      <div class="chip" id="chipEl"></div>
    </div>
  </section>

  <!-- B8: CTA on red, mascot hero -->
  <section class="beat clip" id="b8" data-start="19.4" data-duration="2.0" data-track-index="1">
    <div class="fill red"></div>
    <div class="stage center">
      <img class="mascot" id="mascot3" src="assets/mascot.png" alt="" />
      <div class="name">EMS English Trainer</div>
      <div class="desc">発音はAIが判定。毎日1分、現場英語。</div>
      <div class="link">プロフィールのリンクから</div>
    </div>
  </section>

  <!-- B9: loop bridge -->
  <section class="beat clip" id="b9" data-start="21.4" data-duration="1.4" data-track-index="1">
    <div class="stage center">
      <div class="big">言えたら<span class="r">🔥</span>をコメント</div>
      <div class="sub">フォローで毎日1フレーズ</div>
      <img class="mascot" id="mascot4" src="assets/mascot.png" alt="" />
    </div>
  </section>

  <!-- audio track (synthesized BGM/SFX + TTS, muxed by HyperFrames) -->
  <audio id="track" src="audio.wav" data-start="0" data-duration="22.8" data-track-index="20" data-volume="1"></audio>

  <!-- persistent overlays -->
  <div id="wm">EMS ENGLISH TRAINER</div>
  <div id="flash"></div>
</div>

<script>
(function () {
  const R = window.REEL;                       // shared timeline (timeline.js)
  const V = (window.__hyperframes && window.__hyperframes.getVariables)
    ? window.__hyperframes.getVariables()
    : { q:'Can you tell me what happened?', qjp:'何があったか教えてもらえますか？',
        a:'I suddenly felt chest pain.', ajp:'急に胸が痛くなりました。',
        framework:'OPQRST', stepWord:'Provocation', sceneTitle:'胸痛' };

  const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

  /* particle-aware JP line splitter (ported from the original template) */
  function splitJp(s) {
    if (s.length <= 11) return [s];
    const mid = s.length / 2;
    let best = Math.round(mid), bestScore = -1e9;
    for (let i = 4; i <= s.length - 4; i++) {
      const prev = s[i - 1];
      let score = -Math.abs(i - mid) * 10;
      if ('、。！？・」'.includes(prev)) score += 100;
      else if ('をにではがとへもの'.includes(prev)) score += 60;
      if ('、。！？」'.includes(s[i])) score -= 200;
      if (score > bestScore) { bestScore = score; best = i; }
    }
    return [s.slice(0, best), s.slice(best)];
  }

  /* ----- populate text + auto-fit type ----- */
  // B2 JP phrase: masked lines, sized so the longest line fills the column
  const jpEl = document.getElementById('phraseJp');
  const chunks = splitJp('「' + V.qjp + '」');
  const jpMax = Math.max(...chunks.map(c => c.length));
  jpEl.style.fontSize = Math.min(92, Math.floor(830 / jpMax)) + 'px';
  for (const chunk of chunks) {
    const line = document.createElement('div'); line.className = 'line';
    const span = document.createElement('span'); span.textContent = chunk;
    line.appendChild(span); jpEl.appendChild(line);
  }

  // B4 kinetic answer words
  const words = V.q.split(' ');
  const kin = document.getElementById('kineticEl');
  words.forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'w' + (i < 2 ? ' hl' : '');
    s.textContent = w;
    kin.appendChild(s);
  });

  document.getElementById('ansEn').textContent = V.q;
  document.getElementById('ansJp').textContent = V.qjp;
  document.getElementById('replyEn').textContent = V.a;

  // B7 reply JP: same particle-aware breaking
  const rjEl = document.getElementById('replyJp');
  const rjChunks = splitJp(V.ajp);
  const rjMax = Math.max(...rjChunks.map(c => c.length));
  rjEl.style.fontSize = Math.min(78, Math.floor(820 / rjMax)) + 'px';
  for (const chunk of rjChunks) {
    const line = document.createElement('div'); line.className = 'line';
    line.textContent = chunk;
    rjEl.appendChild(line);
  }
  document.getElementById('chipEl').innerHTML =
    '<b>' + esc(V.framework) + '</b>｜' + esc(V.stepWord) + '（' + esc(V.sceneTitle) + '）';

  /* ---------------- one paused, seekable GSAP timeline ---------------- */
  const tl = gsap.timeline({ paused: true });
  const at = id => R.beat(id)[1];              // global start of a beat, seconds

  /* Ken Burns: every scene drifts 1.00 -> 1.03 across its whole window */
  for (const [id, s, e] of R.BEATS) {
    tl.fromTo('#' + id, { scale: 1 }, { scale: 1.03, duration: e - s, ease: 'sine.inOut' }, s);
  }

  /* backdrop dots: gentle pulse locked to the 104 BPM grid */
  const halfBeat = 60 / R.BPM / 2;
  tl.fromTo('#dots', { scale: 1 },
    { scale: 1.015, duration: halfBeat, ease: 'sine.inOut',
      yoyo: true, repeat: Math.max(0, Math.floor(R.TOTAL / halfBeat) - 1) }, 0);

  /* ---- B1 hook slam ---- */
  tl.fromTo('#slamEl', { opacity: 0, scale: 1.9 },
    { opacity: 1, scale: 1, duration: 0.42, ease: 'back.out(1.6)' }, 0.04)
    .fromTo('#slamEl', { x: 0 },
      { keyframes: { x: [0, 12, -8, 4, 0] }, duration: 0.34, ease: 'none' }, 0.06)
    .from('#b1 .under', { opacity: 0, y: 24, duration: 0.26, ease: 'expo.out' }, 0.52)
    .fromTo('#mascot1', { opacity: 0, scale: 0, rotation: -6 },
      { opacity: 1, scale: 1, rotation: -6, duration: 0.42, ease: 'back.out(2)' }, 0.48)
    .to('#mascot1', { rotation: 2, duration: 0.45, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0.9);

  /* ---- B2 JP phrase ---- */
  tl.from('#b2 .tag', { opacity: 0, scale: 0.8, duration: 0.24, ease: 'back.out(2)' }, at('b2'))
    .from('#b2 .line>span', { yPercent: 110, duration: 0.48, ease: 'expo.out', stagger: 0.2 }, at('b2') + 0.18)
    .from('#b2 .sub', { opacity: 0, y: 20, duration: 0.26, ease: 'expo.out' }, at('b2') + 0.9);

  /* ---- B3 countdown: 3 digits + colour swaps, mascot hops ---- */
  const b3 = at('b3'), palette = [
    { bg: 'var(--red)',    fg: '#FFFFFF' },
    { bg: 'var(--yellow)', fg: 'var(--ink)' },
    { bg: 'var(--sky)',    fg: '#FFFFFF' },
  ];
  ['#cd3', '#cd2', '#cd1'].forEach((sel, i) => {
    const t = b3 + i;
    tl.set('#b3fill', { backgroundColor: palette[i].bg }, t);
    for (const s of ['#cd3', '#cd2', '#cd1']) tl.set(s, { opacity: s === sel ? 1 : 0, color: palette[i].fg }, t);
    tl.fromTo(sel, { scale: 1.45 }, { scale: 1.0, duration: 0.3, ease: 'expo.out' }, t);
  });
  tl.set('#mascot2', { opacity: 1 }, b3)
    .to('#mascot2', { keyframes: [
        { y: -46, duration: 0.34, ease: 'back.out(2)' },
        { y: 0,   duration: 0.66, ease: 'bounce.out' } ],
      repeat: 2 }, b3);

  /* ---- B4 kinetic answer: words pop on the beat grid ---- */
  const wt = R.wordTimes(words.length);
  tl.from('#b4 .tag', { opacity: 0, scale: 0.8, duration: 0.2, ease: 'back.out(2)' }, at('b4'));
  document.querySelectorAll('#b4 .w').forEach((w, i) => {
    tl.fromTo(w, { opacity: 0, scale: 0.5 },
      { opacity: 1, scale: 1, duration: 0.3, ease: 'back.out(2.2)' }, wt[i]);
  });

  /* ---- B5 answer settled ---- */
  tl.from('#b5 .en', { opacity: 0, y: 36, duration: 0.28, ease: 'expo.out' }, at('b5'))
    .from('#b5 .rule', { scaleX: 0, duration: 0.4, ease: 'expo.out' }, at('b5') + 0.26)
    .from('#b5 .jp', { opacity: 0, y: 28, duration: 0.3, ease: 'expo.out' }, at('b5') + 0.42);

  /* ---- B6 reply EN ---- */
  tl.from('#b6 .tag', { opacity: 0, scale: 0.8, duration: 0.2, ease: 'back.out(2)' }, at('b6'))
    .from('#b6 .quotewrap', { opacity: 0, x: 70, duration: 0.42, ease: 'expo.out' }, at('b6') + 0.16);

  /* ---- B7 reply JP + framework ---- */
  tl.from('#b7 .quotewrap', { opacity: 0, x: 70, duration: 0.38, ease: 'expo.out' }, at('b7'))
    .from('#b7 .chip', { opacity: 0, y: 18, duration: 0.28, ease: 'expo.out' }, at('b7') + 0.46);

  /* ---- B8 CTA ---- */
  tl.fromTo('#mascot3', { opacity: 0, scale: 0, rotation: -4 },
      { opacity: 1, scale: 1, rotation: -4, duration: 0.42, ease: 'back.out(2)' }, at('b8') + 0.04)
    .to('#mascot3', { rotation: 3, duration: 0.5, ease: 'sine.inOut', yoyo: true, repeat: 1 }, at('b8') + 0.5)
    .from('#b8 .name', { opacity: 0, y: 30, duration: 0.24, ease: 'expo.out' }, at('b8') + 0.3)
    .from('#b8 .desc', { opacity: 0, y: 24, duration: 0.24, ease: 'expo.out' }, at('b8') + 0.46)
    .from('#b8 .link', { opacity: 0, y: 30, duration: 0.26, ease: 'back.out(1.6)' }, at('b8') + 0.64);

  /* ---- B9 loop bridge ---- */
  tl.from('#b9 .big', { opacity: 0, y: 40, duration: 0.3, ease: 'expo.out' }, at('b9') + 0.06)
    .from('#b9 .sub', { opacity: 0, y: 24, duration: 0.26, ease: 'expo.out' }, at('b9') + 0.42)
    .fromTo('#mascot4', { opacity: 0, scale: 0, rotation: 5 },
      { opacity: 1, scale: 1, rotation: 5, duration: 0.42, ease: 'back.out(2)' }, at('b9') + 0.32);

  /* ---- watermark colour on dark scenes ---- */
  tl.set('#wm', { color: 'rgba(255,255,255,.55)' }, at('b4'))
    .set('#wm', { color: 'rgba(35,37,58,.35)' }, at('b5'))
    .set('#wm', { color: 'rgba(255,255,255,.55)' }, at('b8'))
    .set('#wm', { color: 'rgba(35,37,58,.35)' }, at('b9'));

  /* ---- white flash: open decay, answer micro-flash, seamless loop close ---- */
  tl.fromTo('#flash', { opacity: 1 }, { opacity: 0, duration: 0.26, ease: 'expo.out' }, 0)
    .fromTo('#flash', { opacity: 0.55 }, { opacity: 0, duration: 0.15, ease: 'expo.out' }, at('b4'))
    .fromTo('#flash', { opacity: 0 }, { opacity: 1, duration: 0.3, ease: 'power2.in' }, R.TOTAL - 0.38);

  window.__timelines = window.__timelines || {};
  window.__timelines['reel'] = tl;
})();
</script>
</body>
</html>
