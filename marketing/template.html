<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>EMS English Trainer — Daily Reel Template</title>
<style>
  @font-face{
    font-family:"Noto Sans JP";
    src:url("assets/NotoSansJP.ttf") format("truetype");
    font-weight:100 900;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --ink:#23253A;      /* warm navy (uniform) */
    --cream:#FFF6E7;    /* warm cream */
    --red:#E8433F;      /* rescue red (cap cross) */
    --yellow:#FFC53D;   /* pop yellow */
    --sky:#57B7E6;      /* pop sky blue */
    --mute:#8A8Fa6;
  }
  html,body{width:1080px;height:1920px;overflow:hidden;background:var(--cream)}
  body{font-family:"Noto Sans JP","Noto Color Emoji",sans-serif;color:var(--ink);position:relative}

  /* ---------- backdrop: cream + soft polka dots + color blobs ---------- */
  .bg{position:absolute;inset:-10%;background:
      radial-gradient(circle at 82% 10%, rgba(87,183,230,.18), transparent 42%),
      radial-gradient(circle at 12% 92%, rgba(232,67,63,.12), transparent 45%),
      var(--cream)}
  .dots{position:absolute;inset:-10%;
      background-image:radial-gradient(circle, rgba(35,37,58,.05) 0 12px, transparent 13px);
      background-size:150px 150px}

  /* ---------- beats ---------- */
  .beat{position:absolute;inset:0;visibility:hidden}
  .beat.on{visibility:visible}
  .beat .stage{position:absolute;inset:0;padding:0 108px;display:flex;flex-direction:column;justify-content:center}
  .beat .stage.center{align-items:center;text-align:center}
  .beat.whitebg{background:#FFFFFF}
  .beat.inkbg{background:var(--ink);color:var(--cream)}
  .beat.redbg{background:var(--red);color:#fff}

  .tag{display:inline-flex;align-items:center;gap:14px;align-self:flex-start;
       background:var(--red);color:#fff;border-radius:999px;padding:16px 40px;
       font-size:36px;font-weight:900;letter-spacing:.14em;transform:rotate(-2deg)}
  .center .tag{align-self:center}
  .inkbg .tag{background:var(--yellow);color:var(--ink)}

  /* mascot sticker (rounded square, thick border, offset shadow) */
  .mascot{position:absolute;background:#fff;border:10px solid var(--ink);
          border-radius:30%;box-shadow:0 16px 0 rgba(35,37,58,.14);object-fit:cover}

  /* b1 slam */
  .slam{font-size:118px;font-weight:900;line-height:1.24;letter-spacing:.01em;white-space:nowrap}
  .slam .r{color:var(--red)}
  #b1 .under{margin-top:44px;font-size:40px;font-weight:800;letter-spacing:.2em;color:var(--mute)}
  #b1 .mascot{width:340px;height:340px;bottom:170px;left:50%;margin-left:-170px}
  #b1 .stage{justify-content:center;padding-bottom:330px}

  /* b2 JP phrase */
  #b2 .phrase{margin-top:70px;font-weight:900;line-height:1.42}
  #b2 .phrase .line{white-space:nowrap}
  #b2 .sub{margin-top:70px;font-size:44px;font-weight:800;color:var(--sky)}
  .line{overflow:hidden}
  .line>span{display:inline-block}

  /* b3 countdown */
  .count{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .count .n{font-size:540px;font-weight:900;line-height:1}
  .count .hint{position:absolute;bottom:430px;left:0;right:0;text-align:center;
               font-size:46px;font-weight:900;letter-spacing:.2em}
  #b3 .mascot{width:230px;height:230px;bottom:150px;left:50%;margin-left:-115px}

  /* b4 kinetic answer (ink) */
  #b4 .stage{justify-content:center}
  .kinetic{font-size:108px;font-weight:900;line-height:1.24;letter-spacing:-.01em;margin-top:72px}
  .kinetic .w{display:inline-block;margin-right:.24em}
  .kinetic .w.hl{color:var(--yellow)}

  /* b5 answer settled (cream) */
  #b5 .en{font-size:84px;font-weight:900;line-height:1.3}
  #b5 .rule{width:130px;height:10px;border-radius:99px;background:var(--red);margin:60px 0}
  #b5 .jp{font-size:50px;font-weight:700;color:var(--mute);line-height:1.55}

  /* b6/b7 patient reply (white) */
  .quotewrap{border-left:12px solid var(--red);padding-left:56px;border-radius:2px}
  #b6 .en{font-size:88px;font-weight:900;line-height:1.32}
  #b7 .jp{font-weight:900;line-height:1.44}
  #b7 .jp .line{white-space:nowrap}
  .chip{margin-top:76px;display:inline-flex;align-self:flex-start;align-items:center;gap:14px;
        background:var(--cream);border:6px solid var(--ink);border-radius:999px;
        padding:18px 42px;font-size:36px;font-weight:900;transform:rotate(-1.5deg)}
  .chip b{color:var(--red)}

  /* b8 CTA (red) */
  #b8 .mascot{position:static;width:400px;height:400px;border-color:#fff;
              box-shadow:0 16px 0 rgba(0,0,0,.18)}
  #b8 .name{margin-top:52px;font-size:74px;font-weight:900}
  #b8 .desc{margin-top:26px;font-size:45px;font-weight:800;opacity:.95}
  #b8 .link{margin-top:64px;display:inline-block;background:var(--ink);color:#fff;
            border-radius:999px;padding:30px 64px;font-size:46px;font-weight:900;
            box-shadow:0 12px 0 rgba(0,0,0,.18)}

  /* b9 loop bridge (cream) */
  #b9 .big{font-size:84px;font-weight:900;line-height:1.3;white-space:nowrap}
  #b9 .big .r{color:var(--red)}
  #b9 .sub{margin-top:56px;font-size:46px;font-weight:800;color:var(--mute)}
  #b9 .mascot{width:250px;height:250px;bottom:180px;left:50%;margin-left:-125px}
  #b9 .stage{padding-bottom:260px}

  /* watermark + flash */
  #wm{position:absolute;bottom:88px;left:0;right:0;text-align:center;font-size:30px;
      font-weight:900;letter-spacing:.34em;color:rgba(35,37,58,.35);z-index:60}
  body.darkbeat #wm{color:rgba(255,255,255,.55)}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:100;pointer-events:none}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="dots"></div>

  <!-- B1: hook slam + mascot bounce -->
  <section class="beat" id="b1"><div class="stage center">
    <div class="slam" id="slamEl">これ、<span class="r">英語</span>で<br>言えますか？</div>
    <div class="under">救急現場のひとこと</div>
    <img class="mascot" id="mascot1" alt="">
  </div></section>

  <!-- B2: the JP phrase -->
  <section class="beat whitebg" id="b2"><div class="stage">
    <div class="tag">🚑 きょうの1フレーズ</div>
    <div class="phrase" id="phraseJp"></div>
    <div class="sub" id="b2sub">↓ 3秒でこたえ</div>
  </div></section>

  <!-- B3: countdown (red→yellow→sky) -->
  <section class="beat" id="b3">
    <div class="count" id="countEl"><div class="n" id="countN">3</div>
    <div class="hint">声に出して！</div></div>
    <img class="mascot" id="mascot2" alt="">
  </section>

  <!-- B4: kinetic answer on ink -->
  <section class="beat inkbg" id="b4"><div class="stage">
    <div class="tag">ANSWER ✨</div>
    <div class="kinetic" id="kineticEl"></div>
  </div></section>

  <!-- B5: answer settled -->
  <section class="beat" id="b5"><div class="stage">
    <div class="en" id="ansEn"></div>
    <div class="rule"></div>
    <div class="jp" id="ansJp"></div>
  </div></section>

  <!-- B6: patient reply EN -->
  <section class="beat whitebg" id="b6"><div class="stage">
    <div class="tag">🗣️ 患者はこう返す</div>
    <div class="quotewrap" style="margin-top:80px"><div class="en" id="replyEn"></div></div>
  </div></section>

  <!-- B7: reply JP + framework -->
  <section class="beat whitebg" id="b7"><div class="stage">
    <div class="quotewrap"><div class="jp" id="replyJp"></div></div>
    <div class="chip" id="chipEl"></div>
  </div></section>

  <!-- B8: CTA on red, mascot hero -->
  <section class="beat redbg" id="b8"><div class="stage center">
    <img class="mascot" id="mascot3" alt="">
    <div class="name">EMS English Trainer</div>
    <div class="desc">発音はAIが判定。毎日1分、現場英語。</div>
    <div class="link">プロフィールのリンクから</div>
  </div></section>

  <!-- B9: loop bridge -->
  <section class="beat" id="b9"><div class="stage center">
    <div class="big">言えたら<span class="r">🔥</span>をコメント</div>
    <div class="sub">フォローで毎日1フレーズ</div>
    <img class="mascot" id="mascot4" alt="">
  </div></section>

  <div id="wm">EMS ENGLISH TRAINER</div>
  <div id="flash"></div>

<script>
/* Deterministic, seekable animation: the generator calls seek(ms) then screenshots.
 * Loop design: frames at t=0 and t=TOTAL are both fully white (flash-cut loop). */
const BEATS = [
  ['b1',    0,  1400],   // hook slam (snappy)
  ['b2', 1400,  5000],   // JP phrase — reading time
  ['b3', 5000,  8000],   // countdown, a full second per digit — thinking time
  ['b4', 8000, 11200],   // answer, word by word
  ['b5', 11200, 14400],  // answer settled EN+JP — reading time
  ['b6', 14400, 17000],  // patient reply EN
  ['b7', 17000, 19400],  // patient reply JP + framework
  ['b8', 19400, 21400],  // CTA
  ['b9', 21400, 22800],  // loop bridge
];
const TOTAL = 22800;

/* ---------- easing library: linear motion is banned ---------- */
const clamp01 = x => Math.max(0, Math.min(1, x));
const easeOutExpo   = p => p >= 1 ? 1 : 1 - Math.pow(2, -10 * p);
const easeOutBack   = p => { const c = 1.70158 + 1; return 1 + c * Math.pow(p - 1, 3) + (c - 1) * Math.pow(p - 1, 2); };
const easeOutCubic  = p => 1 - Math.pow(1 - p, 3);
const easeInOutCubic= p => p < .5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2;
const easeInOutSine = p => -(Math.cos(Math.PI * p) - 1) / 2;
const expoOut = easeOutExpo, backOut = easeOutBack;
/* progress of a window */
const win = (t, s, d) => clamp01((t - s) / d);

/* ---------- beat sync ----------
 * setup() may receive beatsMs (timestamps of the backing track's beats).
 * Scene cuts snap onto the nearest beat, kinetic word pops land on half-beats,
 * and beatPulse() drives a decaying scale kick on every beat. */
let BEAT_TIMES = null;
function applyBeatGrid(beats){
  BEAT_TIMES = beats.filter(b => b > 0 && b < TOTAL - 400).sort((a, b) => a - b);
  if (!BEAT_TIMES.length) { BEAT_TIMES = null; return; }
  for (let i = 1; i < BEATS.length; i++) {           // snap each cut to a beat
    const target = BEATS[i][1];
    let best = null, bd = 351;
    for (const b of BEAT_TIMES) { const d = Math.abs(b - target); if (d < bd) { bd = d; best = b; } }
    if (best !== null) { BEATS[i][1] = best; BEATS[i - 1][2] = best; }
  }
  for (let i = 1; i < BEATS.length; i++) {           // keep cuts monotonic, >=500ms apart
    if (BEATS[i][1] < BEATS[i - 1][1] + 500) { BEATS[i][1] = BEATS[i - 1][1] + 500; BEATS[i - 1][2] = BEATS[i][1]; }
  }
}
function beatPulse(t){
  if (!BEAT_TIMES) return 0;
  let last = -1e9;
  for (const b of BEAT_TIMES) { if (b <= t) last = b; else break; }
  return Math.exp(-(t - last) / 110);
}
/* `count` grid points inside [from, until] for quantized text pops.
 * Tries half-beats first, then quarter- and eighth-notes, so every word
 * still lands on a musical subdivision even in a short scene. */
function gridTimes(from, count, until){
  if (!BEAT_TIMES || BEAT_TIMES.length < 2) return null;
  for (const div of [2, 4, 8]) {
    const pts = [];
    for (let i = 0; i < BEAT_TIMES.length - 1; i++) {
      const step = (BEAT_TIMES[i + 1] - BEAT_TIMES[i]) / div;
      for (let k = 0; k < div; k++) pts.push(BEAT_TIMES[i] + k * step);
    }
    pts.push(BEAT_TIMES[BEAT_TIMES.length - 1]);
    const usable = pts.filter(p => p >= from && p <= until);
    if (usable.length >= count) return usable.slice(0, count);
  }
  return null;
}

function setup(p){
  // split the JP phrase into masked lines for staggered reveal,
  // sizing the type so the longest line fills the 864px column
  const jpEl = document.getElementById('phraseJp');
  jpEl.innerHTML = '';
  const chunks = splitJp('「' + p.qjp + '」');
  const maxLen = Math.max(...chunks.map(c => c.length));
  jpEl.style.fontSize = Math.min(92, Math.floor(830 / maxLen)) + 'px';
  for (const chunk of chunks) {
    const line = document.createElement('div'); line.className = 'line';
    const span = document.createElement('span'); span.textContent = chunk;
    line.appendChild(span); jpEl.appendChild(line);
  }

  const words = p.q.split(' ');
  const kin = document.getElementById('kineticEl');
  kin.innerHTML = '';
  words.forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'w' + (i < 2 ? ' hl' : '');
    s.textContent = w;
    kin.appendChild(s);
  });

  document.getElementById('ansEn').textContent = p.q;
  document.getElementById('ansJp').textContent = p.qjp;
  document.getElementById('replyEn').textContent = p.a;
  // reply JP: same particle-aware line breaking as the question
  const rjEl = document.getElementById('replyJp');
  rjEl.innerHTML = '';
  const rjChunks = splitJp(p.ajp);
  const rjMax = Math.max(...rjChunks.map(c => c.length));
  rjEl.style.fontSize = Math.min(78, Math.floor(820 / rjMax)) + 'px';
  for (const chunk of rjChunks) {
    const line = document.createElement('div'); line.className = 'line';
    line.textContent = chunk;
    rjEl.appendChild(line);
  }
  document.getElementById('chipEl').innerHTML =
    '<b>' + esc(p.framework) + '</b>｜' + esc(p.stepWord) + '（' + esc(p.sceneTitle) + '）';
  if (p.mascotSrc) for (const id of ['mascot1', 'mascot2', 'mascot3', 'mascot4'])
    document.getElementById(id).src = p.mascotSrc;
  if (Array.isArray(p.beatsMs) && p.beatsMs.length) applyBeatGrid(p.beatsMs);
  document.title = 'ready';
}
function esc(s){ const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function splitJp(s){
  if (s.length <= 11) return [s];
  // break near the middle, preferring after punctuation, then after particles
  const mid = s.length / 2;
  let best = Math.round(mid), bestScore = -1e9;
  for (let i = 4; i <= s.length - 4; i++) {
    const prev = s[i - 1];
    let score = -Math.abs(i - mid) * 10;
    if ('、。！？・」'.includes(prev)) score += 100;
    else if ('をにではがとへもの'.includes(prev)) score += 60;
    if ('、。！？」'.includes(s[i])) score -= 200; // never orphan punctuation
    if (score > bestScore) { bestScore = score; best = i; }
  }
  return [s.slice(0, best), s.slice(best)];
}

/* sticker entrance: bouncy pop + gentle continuous wiggle */
function stickerIn(el, lt, at, baseRot){
  const p = easeOutBack(win(lt, at, 420));
  el.style.opacity = easeOutCubic(win(lt, at, 150));
  const wiggle = 3.5 * Math.sin((lt - at) * 0.004);
  el.style.transform = 'scale(' + p + ') rotate(' + (baseRot + wiggle) + 'deg)';
}

function seek(t){
  let active = null, s0 = 0, e0 = 0;
  for (const [id, s, e] of BEATS) {
    const on = t >= s && t < e;
    document.getElementById(id).classList.toggle('on', on);
    if (on) { active = id; s0 = s; e0 = e; }
  }
  const lt = t - s0;                 // local time in the beat
  document.body.classList.toggle('darkbeat', active === 'b4' || active === 'b8');

  /* Ken Burns: the active scene drifts from 1.00 to ~1.03 across its whole
     duration, plus a decaying kick on every music beat — no frame is static */
  if (active) {
    const kb = 1
      + 0.03 * easeInOutSine(clamp01(lt / (e0 - s0)))
      + 0.012 * beatPulse(t);
    document.getElementById(active).style.transform = 'scale(' + kb + ')';
  }

  /* white flash: decays from t=0, rises into t=TOTAL (seamless loop),
     plus a micro-flash on the answer cut */
  const start = 1 - expoOut(win(t, 0, 260));
  const end = Math.pow(win(t, TOTAL - 380, 300), 2); // fully white for the last ~80ms
  const answerPop = active === 'b4' ? (1 - expoOut(win(lt, 0, 150))) * 0.55 : 0;
  document.getElementById('flash').style.opacity = Math.max(start, end, answerPop);

  if (active === 'b1') {
    // slam: overshoot zoom + decaying shake
    const p = win(lt, 60, 340);
    const sc = 1.9 - 0.9 * backOut(p);
    const shake = (1 - win(lt, 380, 320)) * 13 * Math.sin(lt * 0.11);
    const el = document.getElementById('slamEl');
    el.style.opacity = easeOutCubic(win(lt, 40, 80));
    el.style.transform = 'scale(' + sc + ') translateX(' + shake + 'px)';
    fade(q('#b1 .under'), win(lt, 520, 260), 24);
    stickerIn(document.getElementById('mascot1'), lt, 480, -6);
  }
  if (active === 'b2') {
    fade(q('#b2 .tag'), win(lt, 0, 240), 0);
    document.querySelectorAll('#b2 .line>span').forEach((sp, i) => {
      const p = expoOut(win(lt, 180 + i * 200, 480));
      sp.style.transform = 'translateY(' + (1 - p) * 110 + '%)';
    });
    fade(q('#b2 .sub'), win(lt, 900, 260), 20);
  }
  if (active === 'b3') {
    const digitDur = (e0 - s0) / 3;
    const idx = Math.min(2, Math.floor(lt / digitDur));
    const colors = [['var(--red)', '#FFFFFF'], ['var(--yellow)', 'var(--ink)'], ['var(--sky)', '#FFFFFF']];
    const c = document.getElementById('countEl');
    c.style.background = colors[idx][0];
    c.style.color = colors[idx][1];
    const n = document.getElementById('countN');
    n.textContent = 3 - idx;
    const p = expoOut(win(lt % digitDur, 0, 300));
    n.style.transform = 'scale(' + (1.45 - 0.45 * p) + ')';
    // mascot hops on every digit
    const hop = easeOutBack(win(lt % digitDur, 0, 340));
    const m = document.getElementById('mascot2');
    m.style.opacity = 1;
    m.style.transform = 'translateY(' + (1 - hop) * -46 + 'px) rotate(' + 3.5 * Math.sin(lt * 0.004) + 'deg)';
  }
  if (active === 'b4') {
    fade(q('#b4 .tag'), win(lt, 0, 200), 0);
    const words = document.querySelectorAll('#b4 .w');
    const stagger = Math.min(220, 2000 / words.length);
    // quantize word pops to the beat grid, leaving read time before the cut
    const grid = gridTimes(s0 + 150, words.length, e0 - 800);
    words.forEach((w, i) => {
      const at = grid ? grid[i] - s0 : 200 + i * stagger;
      const p = easeOutBack(win(lt, at, 300));
      w.style.opacity = easeOutCubic(win(lt, at, 120));
      w.style.transform = 'scale(' + (0.5 + 0.5 * p) + ')';
    });
  }
  if (active === 'b5') {
    fade(q('#b5 .en'), win(lt, 0, 280), 36);
    q('#b5 .rule').style.transform = 'scaleX(' + expoOut(win(lt, 260, 400)) + ')';
    fade(q('#b5 .jp'), win(lt, 420, 300), 28);
  }
  if (active === 'b6') {
    fade(q('#b6 .tag'), win(lt, 0, 200), 0);
    const p = expoOut(win(lt, 160, 420));
    const el = q('#b6 .quotewrap');
    el.style.opacity = p;
    el.style.transform = 'translateX(' + (1 - p) * 70 + 'px)';
  }
  if (active === 'b7') {
    const p = expoOut(win(lt, 0, 380));
    const el = q('#b7 .quotewrap');
    el.style.opacity = p;
    el.style.transform = 'translateX(' + (1 - p) * 70 + 'px)';
    fade(q('#b7 .chip'), win(lt, 460, 280), 18);
  }
  if (active === 'b8') {
    stickerIn(document.getElementById('mascot3'), lt, 40, -4);
    fade(q('#b8 .name'), win(lt, 300, 240), 30);
    fade(q('#b8 .desc'), win(lt, 460, 240), 24);
    fade(q('#b8 .link'), win(lt, 640, 260), 30);
  }
  if (active === 'b9') {
    fade(q('#b9 .big'), win(lt, 60, 300), 40);
    fade(q('#b9 .sub'), win(lt, 420, 260), 24);
    stickerIn(document.getElementById('mascot4'), lt, 320, 5);
  }
}
function q(sel){ return document.querySelector(sel); }
function fade(el, p, dy){
  const e = expoOut(p);
  el.style.opacity = e;
  el.style.transform = 'translateY(' + (1 - e) * (dy || 0) + 'px)';
}

window.__tpl = { setup, seek, TOTAL };
</script>
</body>
</html>
