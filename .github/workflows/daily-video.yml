name: Daily marketing video

on:
  schedule:
    # 22:00 UTC = 07:00 JST — the video is ready before the morning commute
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date for the video (YYYY-MM-DD, default: today)'
        required: false
      index:
        description: 'Force a specific phrase card index'
        required: false
      silent:
        description: 'Render a silent bed (post with trend audio)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marketing/package-lock.json

      - name: Install FFmpeg and emoji fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-color-emoji

      - name: Install TTS engine
        run: pip install edge-tts

      - name: Install dependencies
        working-directory: marketing
        run: npm ci

      - name: Ensure render browser (Chrome headless shell)
        working-directory: marketing
        env:
          HYPERFRAMES_TELEMETRY_DISABLED: '1'
        run: npx hyperframes browser ensure

      - name: Generate videos (phrase + vocab)
        working-directory: marketing
        env:
          # HyperFrames renders the video; a modern system FFmpeg handles encode + our audio mux
          HYPERFRAMES_FFMPEG_PATH: /usr/bin/ffmpeg
          HYPERFRAMES_FFPROBE_PATH: /usr/bin/ffprobe
          HYPERFRAMES_TELEMETRY_DISABLED: '1'
        run: |
          ARGS=""
          [ -n "${{ inputs.date }}" ] && ARGS="$ARGS --date ${{ inputs.date }}"
          [ -n "${{ inputs.index }}" ] && ARGS="$ARGS --index ${{ inputs.index }}"
          [ "${{ inputs.silent }}" = "true" ] && ARGS="$ARGS --silent"
          node build.mjs $ARGS
          node build.mjs $ARGS --kind vocab

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-reel
          path: marketing/output/*

      - name: Publish to the daily-videos release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view daily-videos --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create daily-videos --repo "$GITHUB_REPOSITORY" \
              --title "Daily marketing videos" \
              --notes "毎朝7時(JST)に自動生成されるTikTok/Instagramリール動画。mp4が動画、txtが投稿用キャプションです。"
          gh release upload daily-videos marketing/output/* --repo "$GITHUB_REPOSITORY" --clobber
